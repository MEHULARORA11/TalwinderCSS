<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark, immersive premium background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Vibrant neon gradient representing the framework energy & musical frequency -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />    <!-- Tailwind Cyan -->
      <stop offset="50%" stop-color="#8b5cf6" />   <!-- Electric Violet -->
      <stop offset="100%" stop-color="#ec4899" />  <!-- Crimson/Pink Beat -->
    </linearGradient>

    <!-- Subtle glow effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Smooth Rounded Background Square for the Icon App Vibe -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Ring / Accent Wave -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-opacity="0.2" />

  <!-- The Abstract TalwinderCSS Monogram (T + Soundwave Shapes) -->
  <g filter="url(#neonGlow)">
    <!-- Main Top Bar (Tailwind-style aerodynamic angle + Audio Bar cut) -->
    <path d="M120 140 C 120 125, 135 110, 150 110 L 362 110 C 377 110, 392 125, 392 140 L 372 190 C 370 195, 360 200, 350 200 L 162 200 C 152 200, 142 195, 140 190 Z" fill="url(#logoGrad)" />
    
    <!-- Left Stem (The First 'T' Component / Deep Melodic drop) -->
    <path d="M210 220 L 210 380 C 210 400, 190 420, 170 420 C 150 420, 135 400, 135 380 L 135 240 Z" fill="url(#logoGrad)" opacity="0.85" />
    
    <!-- Center Stem (The Main 'T' Component / Driving Bass Waveform) -->
    <path d="M280 220 L 280 430 C 280 445, 265 460, 250 460 C 235 460, 220 445, 220 430 L 220 220 Z" fill="url(#logoGrad)" />
    
    <!-- Right Stem (The Twin 'T' Component / Upbeat Treble) -->
    <path d="M350 220 L 350 330 C 350 350, 330 365, 310 365 C 290 365, 275 350, 275 330 L 275 240 Z" fill="url(#logoGrad)" opacity="0.7" />
  </g>

  <!-- Ambient Sound Dots (Adding that studio rhythm detail) -->
  <circle cx="170" cy="450" r="6" fill="#38bdf8" opacity="0.6" />
  <circle cx="310" cy="405" r="6" fill="#ec4899" opacity="0.6" />
</svg>
